spring.application.name=orders-service
# ==============================================================
# CONFIGURACIËN DEL PREFIJO DE LA API
# ==============================================================
# Esto a˝ade /api a todos los endpoints automßticamente.
# Ya puedes eliminar @RequestMapping("/api") de tus Controllers.
server.servlet.context-path=/api

# ==============================================================
# CONFIGURACIËN DE BASE DE DATOS H2 (ACTIVA)
# ==============================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar la consola de H2 para ver las tablas en el navegador
# URL de acceso: http://localhost:8080/api/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraciˇn de Hibernate para crear tablas automßticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

