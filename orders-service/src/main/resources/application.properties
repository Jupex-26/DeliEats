spring.application.name=orders-service
jwt.secret=mi_clave_secreta_super_segura_y_muy_larga_1234567890
# ==============================================================
# CONFIGURACIÓN DEL PREFIJO DE LA API
# ==============================================================
# Esto ańade /api a todos los endpoints automáticamente.
# Ya puedes eliminar @RequestMapping("/api") de tus Controllers.
server.servlet.context-path=/api

# ==============================================================
# CONFIGURACIÓN DE BASE DE DATOS H2 (ACTIVA)
# ==============================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar la consola de H2 para ver las tablas en el navegador
# URL de acceso: http://localhost:8080/api/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de Hibernate para crear tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

