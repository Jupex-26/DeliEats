spring.application.name=orders-service
jwt.secret=mi_clave_secreta_super_segura_y_muy_larga_1234567890




# Ver detalle de seguridad (CORS, filtros, autenticaciÛn)
logging.level.org.springframework.security=DEBUG

# Ver el mapeo de las peticiones que entran
logging.level.org.springframework.web=DEBUG

# Opcional: Ver quÈ hace exactamente el filtro de CORS de Spring
logging.level.org.springframework.web.filter.CorsFilter=DEBUG


# ==============================================================
# CONFIGURACI”N DEL PREFIJO DE LA API
# ==============================================================
# Esto aÒade /api a todos los endpoints autom·ticamente.
# Ya puedes eliminar @RequestMapping("/api") de tus Controllers.
server.servlet.context-path=/api

# ==============================================================
# CONFIGURACI”N DE BASE DE DATOS H2 (ACTIVA)
# ==============================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar la consola de H2 para ver las tablas en el navegador
# URL de acceso: http://localhost:8080/api/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ConfiguraciÛn de Hibernate para crear tablas autom·ticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

