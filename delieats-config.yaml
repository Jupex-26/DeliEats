# ==========================================
# MySQL — Deployment + Service
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delieats-mysql-deployment
spec:
  replicas: 1 # Solo una réplica para la base de datos (stateful)
  selector:
    matchLabels:
      app: delieats
      component: database
  template:
    metadata:
      labels:
        app: delieats
        component: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root_password"
            - name: MYSQL_DATABASE
              value: "orders_db"
            - name: MYSQL_USER
              value: "user"
            - name: MYSQL_PASSWORD
              value: "admin"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: delieats
    component: database
  ports:
    - port: 3306
      targetPort: 3306
---
# ==========================================
# Zookeeper — Deployment + Service
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delieats-zookeeper-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delieats
      component: zookeeper
  template:
    metadata:
      labels:
        app: delieats
        component: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
spec:
  selector:
    app: delieats
    component: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
# ==========================================
# Kafka — Deployment + Service
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delieats-kafka-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delieats
      component: kafka
  template:
    metadata:
      labels:
        app: delieats
        component: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: delieats
    component: kafka
  ports:
    - port: 9092
      targetPort: 9092
