<ion-modal [isOpen]="isOpen" (didDismiss)="closeModal()" class="custom-modal" [backdropDismiss]="false">
  <ng-template>
    <div class="modal-wrapper flex flex-col w-full h-full">
      <!-- Header -->
      <div class="modal-header py-4 px-6 text-center font-bold tracking-wide text-lg">
        {{ title }}
      </div>

      <!-- Body -->
      <div class="modal-body p-8 flex flex-col items-center">
        <div class="main-message text-center text-lg mb-6">
          {{ message }}
        </div>

        @if (hasFieldErrors()) {
          <div class="field-errors-container mb-6 w-full text-left">
            <ul class="list-none p-0 m-0 space-y-2">
              @for (err of getFieldErrorsList(); track err.field) {
                <li class="error-item text-sm">
                  <strong>{{ err.field }}:</strong> {{ err.message }}
                </li>
              }
            </ul>
          </div>
        }

        <button class="btn-submit w-full px-6 py-3 rounded-lg font-bold text-sm text-white transition-colors shadow-md mt-2" (click)="closeModal()">
          ENTENDIDO
        </button>
      </div>
    </div>
  </ng-template>
</ion-modal>
