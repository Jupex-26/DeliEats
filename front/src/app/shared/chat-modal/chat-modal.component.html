<ion-modal [isOpen]="isOpen" (didDismiss)="close()" class="chat-modal">
  <ng-template>
    <div class="chat-container flex flex-col h-full bg-white">
      
      <header class="chat-header p-4 border-b flex items-center justify-between bg-primary text-white">
        <div class="flex items-center gap-3">
          <ion-icon name="person-circle-outline" class="text-3xl"></ion-icon>
          <div>
            <h2 class="text-sm font-bold m-0">{{ receptorNombre }}</h2>
            <p class="text-[10px] opacity-80 m-0">Pedido #{{ pedidoId }}</p>
          </div>
        </div>
        <button (click)="close()" class="bg-transparent border-none text-white cursor-pointer p-1">
          <ion-icon name="close-outline" class="text-2xl"></ion-icon>
        </button>
      </header>

      <div class="messages-area flex-1 overflow-y-auto p-4 bg-gray-50" #scrollMe>
        <div class="flex flex-col gap-3">
          @for (msg of mensajes(); track msg.fechaEnvio) {
          <div class="flex" [ngClass]="msg.emisorId === miUsuarioId ? 'justify-end' : 'justify-start'">
            <div class="max-w-[80%] rounded-2xl px-4 py-2 shadow-sm"
              [ngClass]="msg.emisorId === miUsuarioId ? 'bg-primary text-white rounded-tr-none' : 'bg-white text-gray-800 border rounded-tl-none'">
              <p class="text-sm m-0">{{ msg.contenido }}</p>
              <span class="text-[9px] block mt-1 opacity-60 text-right">
                {{ msg.fechaEnvio | date:'HH:mm' }}
              </span>
            </div>
          </div>
          }
          @if (mensajes().length === 0) {
          <div class="text-center py-10 opacity-40">
            <p class="text-sm">No hay mensajes. ¡Saluda!</p>
          </div>
          }
        </div>
      </div>

      <footer class="chat-footer p-4 border-t bg-white">
        <div class="flex items-center gap-2">
          <input type="text" [(ngModel)]="nuevoMensaje" (keyup.enter)="enviar()" placeholder="Escribe un mensaje..."
            class="chat-input flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm outline-none transition-all text-gray-900">
          <button (click)="enviar()" [disabled]="!nuevoMensaje.trim()"
            class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center border-none shadow-md disabled:opacity-50 transition-all active:scale-95">
            <ion-icon name="send-outline" class="text-xl"></ion-icon>
          </button>
        </div>
      </footer>
    </div>
  </ng-template>
</ion-modal>
