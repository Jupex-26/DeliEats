<ion-modal [isOpen]="isOpen" (didDismiss)="onCancel()" class="custom-modal" [backdropDismiss]="false">
  <ng-template>
    <div class="modal-wrapper flex flex-col w-full h-full">
      <!-- Header -->
      <div class="modal-header py-4 px-6 text-center font-bold tracking-wide text-lg">
        {{ title }}
      </div>

      <!-- Body -->
      <div class="modal-body p-8 flex flex-col items-center">
        <div class="main-message text-center text-lg mb-8">
          {{ message }}
        </div>

        <div class="flex justify-center w-full gap-4">
          <button class="btn-cancel px-6 py-3 rounded-lg font-bold text-sm transition-colors border w-full" (click)="onCancel()">
            {{ cancelText }}
          </button>

          <button class="btn-submit px-6 py-3 rounded-lg font-bold text-sm text-white transition-colors shadow-md w-full" 
            [class.btn-danger]="dangerAction"
            (click)="onConfirm()">
            {{ confirmText }}
          </button>
        </div>
      </div>
    </div>
  </ng-template>
</ion-modal>
