<ion-content>
  <div class="empresa-perfil-page">

    <header class="empresa-header">
      <button class="btn-back" (click)="volver()" aria-label="Volver">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      @if (!loading()) {
      <div class="empresa-hero">
        <div class="avatar-wrapper">
          @if (getFotoUrl(); as url) {
            <img [src]="url" [alt]="empresa()?.nombre" class="avatar-img" (error)="onAvatarError($event)">
          } @else {
            <div class="avatar-placeholder">
              <ion-icon name="business-outline"></ion-icon>
            </div>
          }
        </div>
        <div class="empresa-info">
          <span class="empresa-badge">Restaurante</span>
          <h1>{{ empresa()?.nombre }}</h1>
          <p class="empresa-tipo">{{ empresa()?.tipoCocina?.nombre }}</p>
        </div>
      </div>
      }
    </header>

    @if (loading()) {
    <div class="loading-state">
      <div class="spinner-empresa"></div>
    </div>
    }

    @if (!loading() && empresa()) {

    <nav class="tabs-nav">
      <button class="tab-btn" [class.active]="activeTab() === 'perfil'" (click)="setTab('perfil')">
        <ion-icon name="person-outline"></ion-icon>
        Mi Perfil
      </button>
      <button class="tab-btn" [class.active]="activeTab() === 'pedidos'" (click)="setTab('pedidos')">
        <ion-icon name="receipt-outline"></ion-icon>
        Pedidos
      </button>
      <button class="tab-btn" [class.active]="activeTab() === 'productos'" (click)="setTab('productos')">
        <ion-icon name="restaurant-outline"></ion-icon>
        Productos
      </button>
    </nav>

    @if (activeTab() === 'perfil') {
    <section class="tab-content">
      <app-empresa-perfil-edicion
        [empresa]="empresa()!"
        (empresaActualizada)="onEmpresaActualizada($event)">
      </app-empresa-perfil-edicion>
    </section>
    }

    @if (activeTab() === 'pedidos') {
    <section class="tab-content tab-content--wide">
      <app-empresa-pedidos [empresaId]="empresa()!.id!"></app-empresa-pedidos>
    </section>
    }

    @if (activeTab() === 'productos') {
    <section class="tab-content tab-content--wide">
      <app-empresa-productos [empresa]="empresa()!"></app-empresa-productos>
    </section>
    }

    }
  </div>
</ion-content>
