<nav class="flex items-center justify-between px-6 py-4 bg-base text-main relative z-50 w-full shadow-sm">
  <div class="text-2xl font-bold text-primary tracking-wider">
    <a routerLink="/" class="text-inherit no-underline"><img src="logo.png" alt="Logo DeliEats" class="w-24"></a>
  </div>

  <div class="hidden lg:flex space-x-6 font-medium gap-4">
    <a routerLink="/" class="nav-link text-inherit no-underline">Inicio</a>
    <a routerLink="/restaurantes"
      class="nav-link text-inherit no-underline">Restaurantes</a>
    <a routerLink="/nosotros" class="nav-link text-inherit no-underline">Nosotros</a>
  </div>

  <div class="hidden lg:flex items-center gap-4">
    @if (isLogin()) {
    <div class="flex items-center gap-3">
      <a [routerLink]="getPerfilRoute()"
        class="btn-profile px-4 py-2 rounded-full font-medium transition border-none cursor-pointer no-underline flex items-center">
        {{ getRol() === 'ROLE_EMPRESA' ? 'Mi Restaurante' : 'Mi Perfil' }}
      </a>

      <button (click)="logout()" class="btn-logout px-5 py-2 rounded-full font-semibold transition cursor-pointer">
        Cerrar Sesión
      </button>
    </div>
    } @else {
    <button routerLink="/login"
      class="px-5 py-2 rounded-full font-semibold text-white bg-secondary hover:opacity-90 transition border-none cursor-pointer">
      Iniciar Sesión
    </button>
    }
  </div>

  <button
    class="lg:hidden flex flex-col justify-between items-center w-8 h-6 border-none bg-transparent cursor-pointer p-0 z-50 relative focus:outline-none"
    (click)="toggleMenu()" aria-label="Toggle menu">
    <span class="hamburger-line block transition-all duration-300 ease-out h-1 w-full rounded-sm origin-left"
      [class.rotate-45]="isMenuOpen"></span>
    <span class="hamburger-line block transition-all duration-300 ease-out h-1 w-full rounded-sm"
      [class.opacity-0]="isMenuOpen"></span>
    <span class="hamburger-line block transition-all duration-300 ease-out h-1 w-full rounded-sm origin-left"
      [class.-rotate-45]="isMenuOpen"></span>
  </button>
</nav>

<div
  class="mobile-menu-panel lg:hidden w-full z-40 shadow-lg bg-base transition-all duration-300 ease-in-out overflow-hidden absolute left-0"
  [class.menu-open]="isMenuOpen">
  <div class="mobile-menu-container flex flex-col gap-2 p-4 border-t">
    <a routerLink="/" (click)="toggleMenu()"
      class="nav-link text-main no-underline font-medium py-3 block w-full text-left">Inicio</a>
    <a routerLink="/restaurantes" (click)="toggleMenu()"
      class="nav-link text-main no-underline font-medium py-3 block w-full text-left">Restaurantes</a>
    <a routerLink="/nosotros" (click)="toggleMenu()"
      class="nav-link text-main no-underline font-medium py-3 block w-full text-left">Nosotros</a>

    <div class="pt-4 mt-2 border-t border-gray-100">
      @if (isLogin()) {
      <a (click)="toggleMenu()" [routerLink]="getPerfilRoute()"
        class="btn-profile px-4 py-3 mb-3 rounded-full font-medium transition cursor-pointer text-center w-full block no-underline">
        {{ getRol() === 'ROLE_EMPRESA' ? 'Mi Restaurante' : 'Mi Perfil' }}
      </a>

      <button (click)="logout(); toggleMenu()"
        class="btn-logout mt-2 px-5 py-3 rounded-full font-semibold transition cursor-pointer w-full text-center">
        Cerrar Sesión
      </button>
      } @else {
      
      <button routerLink="/login" (click)="toggleMenu()"
        class="px-5 py-3 rounded-full font-semibold text-white bg-secondary hover:opacity-90 transition border-none cursor-pointer w-full text-center">
        Iniciar Sesión
      </button>
      }
    </div>
  </div>
</div>
